<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no, maximum-scale=1.0">
    <title>STAA PAY · TOP UP APP</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">

    <style>
        :root {
            /* Premium Color System */
            --surface-primary: #ffffff;
            --surface-secondary: #f8fafc;
            --surface-tertiary: #f1f5f9;
            
            --text-primary: #0f172a;
            --text-secondary: #334155;
            --text-tertiary: #64748b;
            --text-inverse: #ffffff;
            
            --brand-primary: #1e3a8a;
            --brand-secondary: #2563eb;
            --brand-tertiary: #3b82f6;
            --brand-muted: #dbeafe;
            
            --accent-success: #10b981;
            --accent-warning: #f59e0b;
            --accent-error: #ef4444;
            --accent-info: #06b6d4;
            
            /* Depth System */
            --shadow-xs: 0 1px 2px rgba(15, 23, 42, 0.04);
            --shadow-sm: 0 2px 8px rgba(15, 23, 42, 0.06);
            --shadow-md: 0 8px 24px rgba(15, 23, 42, 0.08);
            --shadow-lg: 0 16px 48px rgba(15, 23, 42, 0.12);
            --shadow-xl: 0 24px 64px rgba(15, 23, 42, 0.16);
            --shadow-brand: 0 8px 24px rgba(30, 58, 138, 0.2);
            
            /* Glass System */
            --glass-bg: rgba(255, 255, 255, 0.8);
            --glass-border: rgba(30, 58, 138, 0.08);
            --glass-blur: blur(20px) saturate(180%);
            
            /* Border System */
            --radius-xs: 8px;
            --radius-sm: 12px;
            --radius-md: 16px;
            --radius-lg: 20px;
            --radius-xl: 24px;
            --radius-2xl: 32px;
            
            /* Transition System */
            --ease-out-expo: cubic-bezier(0.16, 1, 0.3, 1);
            --ease-out-quint: cubic-bezier(0.22, 1, 0.36, 1);
            --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
            --duration-fast: 150ms;
            --duration-base: 250ms;
            --duration-slow: 400ms;
            --duration-lazy: 600ms;
        }

        body.dark {
            --surface-primary: #0f172a;
            --surface-secondary: #1e293b;
            --surface-tertiary: #334155;
            
            --text-primary: #f1f5f9;
            --text-secondary: #cbd5e1;
            --text-tertiary: #94a3b8;
            --text-inverse: #0f172a;
            
            --brand-primary: #3b82f6;
            --brand-secondary: #60a5fa;
            --brand-tertiary: #93c5fd;
            --brand-muted: #1e3a8a;
            
            --glass-bg: rgba(15, 23, 42, 0.75);
            --glass-border: rgba(59, 130, 246, 0.12);
            
            --shadow-xs: 0 1px 2px rgba(0, 0, 0, 0.2);
            --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.3);
            --shadow-md: 0 8px 24px rgba(0, 0, 0, 0.4);
            --shadow-lg: 0 16px 48px rgba(0, 0, 0, 0.5);
            --shadow-xl: 0 24px 64px rgba(0, 0, 0, 0.6);
            --shadow-brand: 0 8px 24px rgba(59, 130, 246, 0.3);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        body {
            font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--surface-secondary);
            color: var(--text-primary);
            transition: background var(--duration-slow) var(--ease-out-expo),
                        color var(--duration-slow) var(--ease-out-expo);
            overflow: hidden;
            height: 100vh;
            user-select: none;
            -webkit-user-select: none;
        }

        #app-root {
            display: flex;
            flex-direction: column;
            height: 100vh;
            max-width: 480px;
            margin: 0 auto;
            background: var(--surface-primary);
            position: relative;
            box-shadow: var(--shadow-xl);
            transition: background var(--duration-slow) var(--ease-out-expo);
        }

        /* Scrollable Content */
        .app-content {
            flex: 1;
            overflow-y: auto;
            padding: 0 16px 16px;
            -webkit-overflow-scrolling: touch;
            scroll-behavior: smooth;
            overscroll-behavior: contain;
        }
        
        .app-content::-webkit-scrollbar {
            width: 0;
            height: 0;
        }

        /* HEADER REDESIGN - Sticky Premium */
        .app-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 16px;
            background: var(--glass-bg);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border-bottom: 1px solid var(--glass-border);
            position: sticky;
            top: 0;
            z-index: 20;
            transition: all var(--duration-base) var(--ease-out-expo);
        }

        .brand-app {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .brand-app .icon-wrapper {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, var(--brand-primary), var(--brand-secondary));
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: var(--shadow-brand);
            transition: transform var(--duration-fast) var(--ease-spring);
            overflow: hidden;
        }
        
        .brand-app .icon-wrapper:active {
            transform: scale(0.95);
        }

        .brand-app .icon-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .brand-app h1 {
            font-size: 1.25rem;
            font-weight: 800;
            letter-spacing: -0.3px;
            color: var(--text-primary);
            transition: color var(--duration-base) var(--ease-out-expo);
        }

        .theme-toggle-app {
            display: flex;
            align-items: center;
            gap: 8px;
            background: var(--surface-tertiary);
            border: 1px solid transparent;
            border-radius: 40px;
            padding: 8px 16px;
            cursor: pointer;
            color: var(--text-secondary);
            font-weight: 600;
            font-size: 0.8rem;
            transition: all var(--duration-fast) var(--ease-out-expo);
            -webkit-tap-highlight-color: transparent;
        }
        
        .theme-toggle-app:active {
            transform: scale(0.96);
            background: var(--surface-secondary);
        }
        
        .theme-toggle-app i {
            font-size: 0.9rem;
            transition: transform var(--duration-fast) var(--ease-spring);
        }

        /* OPERATIONAL PANEL - Dashboard Style */
        .operational-panel {
            background: var(--surface-secondary);
            border-radius: var(--radius-lg);
            padding: 14px 16px;
            margin: 14px 0;
            border: 1px solid var(--glass-border);
            box-shadow: var(--shadow-xs);
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            font-size: 0.78rem;
            font-weight: 500;
            color: var(--text-secondary);
            transition: all var(--duration-base) var(--ease-out-expo);
        }

        .time-display {
            display: flex;
            align-items: center;
            gap: 6px;
            color: var(--text-tertiary);
            font-feature-settings: "tnum";
            font-variant-numeric: tabular-nums;
        }
        
        .time-display i {
            color: var(--brand-secondary);
            font-size: 0.85rem;
        }

        .status-badge {
            padding: 5px 14px;
            border-radius: 40px;
            font-weight: 700;
            font-size: 0.7rem;
            display: flex;
            align-items: center;
            gap: 5px;
            letter-spacing: 0.3px;
            transition: all var(--duration-base) var(--ease-out-expo);
        }

        .status-badge.open {
            background: rgba(16, 185, 129, 0.08);
            color: var(--accent-success);
        }
        
        .status-badge.open i {
            animation: softPulse 2s ease-in-out infinite;
        }
        
        @keyframes softPulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.7; transform: scale(0.9); }
        }

        .status-badge.closed {
            background: rgba(239, 68, 68, 0.08);
            color: var(--accent-error);
        }

        .new-version-badge {
            background: linear-gradient(135deg, var(--accent-success), #34d399);
            padding: 5px 14px;
            border-radius: 40px;
            font-size: 0.68rem;
            font-weight: 700;
            color: white;
            display: inline-flex;
            align-items: center;
            gap: 4px;
            letter-spacing: 0.3px;
            box-shadow: 0 2px 8px rgba(16, 185, 129, 0.2);
            transition: transform var(--duration-fast) var(--ease-spring);
            white-space: nowrap;
        }
        
        .new-version-badge:hover {
            transform: translateY(-1px);
        }
        
        .new-version-badge i {
            font-size: 0.6rem;
            animation: starPulse 3s ease-in-out infinite;
        }
        
        @keyframes starPulse {
            0%, 100% { transform: rotate(0deg) scale(1); }
            50% { transform: rotate(15deg) scale(1.1); }
        }

        /* WARNING BANNER */
        .warning-banner {
            background: rgba(245, 158, 11, 0.06);
            color: var(--accent-warning);
            padding: 12px 16px;
            border-radius: var(--radius-md);
            margin-bottom: 14px;
            font-size: 0.8rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            border: 1px solid rgba(245, 158, 11, 0.15);
            transition: all var(--duration-base) var(--ease-out-expo);
        }

        /* BANNER SLIDER - Cinematic */
        .banner-slider {
            border-radius: var(--radius-xl);
            overflow: hidden;
            margin-bottom: 18px;
            box-shadow: var(--shadow-lg);
            transition: all var(--duration-base) var(--ease-out-expo);
        }
        
        .banner-slider:active {
            transform: scale(0.98);
        }

        .swiper {
            width: 100%;
            aspect-ratio: 16/9;
            border-radius: var(--radius-xl);
        }

        .swiper-slide {
            position: relative;
        }
        
        .swiper-slide::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, rgba(15, 23, 42, 0.15) 0%, transparent 50%);
            pointer-events: none;
        }

        .swiper-slide img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform var(--duration-slow) var(--ease-out-expo);
        }
        
        .swiper-slide-active img {
            transform: scale(1.02);
        }
        
        .swiper-pagination-bullet {
            width: 6px;
            height: 6px;
            background: rgba(255, 255, 255, 0.7);
            opacity: 0.5;
            transition: all var(--duration-base) var(--ease-out-expo);
        }
        
        .swiper-pagination-bullet-active {
            width: 20px;
            border-radius: 10px;
            opacity: 1;
            background: white;
        }

        /* SECTION TITLE */
        .section-title {
            margin: 18px 0 12px;
            font-size: 1.1rem;
            font-weight: 800;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 8px;
            letter-spacing: -0.2px;
            transition: color var(--duration-base) var(--ease-out-expo);
        }
        
        .section-title i {
            color: var(--brand-secondary);
            font-size: 1rem;
        }

        /* GAME SCROLL */
        .game-scroll-wrapper {
            overflow-x: auto;
            overflow-y: hidden;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
            padding-bottom: 6px;
            scroll-snap-type: x proximity;
        }

        .game-scroll-wrapper::-webkit-scrollbar {
            height: 4px;
            background: transparent;
            border-radius: 10px;
        }

        .game-scroll-wrapper::-webkit-scrollbar-thumb {
            background: var(--glass-border);
            border-radius: 10px;
        }

        .game-horizontal-flex {
            display: inline-flex;
            gap: 12px;
            padding-right: 16px;
        }

        .product-column {
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: 140px;
            scroll-snap-align: start;
        }

        /* GAME CARD REDESIGN */
        .game-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            background: var(--surface-primary);
            border-radius: var(--radius-lg);
            padding: 18px 10px 14px;
            text-align: center;
            transition: all var(--duration-base) var(--ease-out-expo);
            border: 1px solid var(--glass-border);
            cursor: pointer;
            text-decoration: none;
            color: var(--text-primary);
            box-shadow: var(--shadow-xs);
            position: relative;
            -webkit-tap-highlight-color: transparent;
        }
        
        .game-card:active {
            transform: scale(0.96);
            box-shadow: var(--shadow-sm);
            background: var(--surface-secondary);
        }
        
        .game-card:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
            border-color: var(--brand-muted);
        }

        .game-card.disabled {
            opacity: 0.5;
            pointer-events: none;
            filter: grayscale(0.2) brightness(0.95);
        }
        
        .game-card.disabled:hover {
            transform: none;
            box-shadow: var(--shadow-xs);
        }

        .logo-gambar {
            width: 80px;
            height: 80px;
            margin: 0 auto 10px;
            border-radius: var(--radius-md);
            overflow: hidden;
            background: linear-gradient(135deg, var(--surface-tertiary), var(--surface-secondary));
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: var(--shadow-sm);
            transition: all var(--duration-base) var(--ease-out-expo);
        }
        
        .game-card:hover .logo-gambar {
            box-shadow: var(--shadow-md);
            transform: scale(1.03);
        }

        .logo-gambar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .game-name {
            font-weight: 700;
            font-size: 0.85rem;
            margin-bottom: 3px;
            color: var(--text-primary);
            letter-spacing: -0.1px;
        }

        .game-card small {
            font-size: 0.65rem;
            color: var(--text-tertiary);
            font-weight: 500;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
        }
        
        .game-card small i {
            font-size: 0.55rem;
            opacity: 0.8;
        }

        /* KEUNGGULAN */
        .keunggulan-section {
            display: flex;
            justify-content: space-around;
            flex-wrap: wrap;
            gap: 8px;
            margin: 18px 0;
            padding: 12px 10px;
            background: var(--surface-secondary);
            border-radius: var(--radius-lg);
            border: 1px solid var(--glass-border);
        }

        .keunggulan-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-weight: 600;
            font-size: 0.72rem;
            padding: 6px 12px;
            border-radius: 40px;
            background: var(--surface-primary);
            color: var(--text-secondary);
            border: 1px solid var(--glass-border);
            transition: all var(--duration-fast) var(--ease-out-expo);
        }
        
        .keunggulan-item i {
            color: var(--brand-secondary);
            font-size: 0.75rem;
        }

        /* FOOTER */
        .footer-staa {
            text-align: center;
            padding: 18px 0;
            font-size: 0.68rem;
            color: var(--text-tertiary);
            border-top: 1px solid var(--glass-border);
            margin-top: 14px;
            letter-spacing: 0.2px;
        }

        /* BOTTOM NAVIGATION - Floating Glass */
        .bottom-nav {
            background: var(--glass-bg);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border-top: 1px solid var(--glass-border);
            display: flex;
            justify-content: space-around;
            padding: 8px 16px 16px;
            z-index: 30;
            position: relative;
        }
        
        .bottom-nav::before {
            content: '';
            position: absolute;
            top: 0;
            left: 16px;
            right: 16px;
            height: 1px;
            background: linear-gradient(to right, transparent, var(--glass-border), transparent);
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 3px;
            background: none;
            border: none;
            cursor: pointer;
            color: var(--text-tertiary);
            font-size: 0.65rem;
            font-weight: 600;
            padding: 8px 12px;
            border-radius: var(--radius-sm);
            transition: all var(--duration-fast) var(--ease-spring);
            -webkit-tap-highlight-color: transparent;
            position: relative;
        }
        
        .nav-item i {
            font-size: 1.2rem;
            transition: transform var(--duration-fast) var(--ease-spring);
        }
        
        .nav-item:active {
            transform: scale(0.9);
        }

        .nav-item.active {
            color: var(--brand-secondary);
        }
        
        .nav-item.active::after {
            content: '';
            position: absolute;
            bottom: -2px;
            width: 20px;
            height: 3px;
            background: var(--brand-secondary);
            border-radius: 2px;
            transition: all var(--duration-base) var(--ease-spring);
        }
        
        .nav-item.active i {
            transform: translateY(-2px);
        }

        /* POPUP - Modern Modal */
        .popup-overlay {
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            opacity: 0;
            visibility: hidden;
            transition: all var(--duration-slow) var(--ease-out-expo);
            padding: 20px;
        }

        .popup-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .popup-container {
            width: 100%;
            max-width: 360px;
            background: var(--surface-primary);
            border-radius: var(--radius-2xl);
            padding: 28px 20px 24px;
            text-align: center;
            border: 1px solid var(--glass-border);
            box-shadow: var(--shadow-xl);
            transform: scale(0.92) translateY(20px);
            transition: transform var(--duration-slow) var(--ease-spring);
            position: relative;
        }

        .popup-overlay.active .popup-container {
            transform: scale(1) translateY(0);
        }

        .popup-close {
            position: absolute;
            top: 12px;
            right: 12px;
            width: 32px;
            height: 32px;
            background: rgba(239, 68, 68, 0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--accent-error);
            cursor: pointer;
            border: none;
            font-size: 0.85rem;
            transition: all var(--duration-fast) var(--ease-out-expo);
        }
        
        .popup-close:hover {
            background: rgba(239, 68, 68, 0.2);
            transform: rotate(90deg);
        }

        .popup-image {
            width: 100%;
            border-radius: var(--radius-lg);
            margin: 12px 0;
            box-shadow: var(--shadow-md);
        }

        .popup-button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--brand-primary), var(--brand-secondary));
            border: none;
            border-radius: 50px;
            color: white;
            font-weight: 800;
            font-size: 0.95rem;
            cursor: pointer;
            margin-top: 12px;
            box-shadow: var(--shadow-brand);
            transition: all var(--duration-fast) var(--ease-spring);
            letter-spacing: 0.2px;
        }
        
        .popup-button:active {
            transform: scale(0.96);
            box-shadow: var(--shadow-sm);
        }
        
        .popup-container input[type="checkbox"] {
            accent-color: var(--brand-secondary);
            width: 16px;
            height: 16px;
        }
        
        .popup-container label {
            font-size: 0.7rem;
            color: var(--text-tertiary);
            font-weight: 500;
        }

        /* LOADING - Cinematic */
        .loading-overlay {
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            z-index: 10000;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            visibility: hidden;
            transition: all var(--duration-slow) var(--ease-out-expo);
        }

        .loading-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .loading-container {
            text-align: center;
        }

        .loading-logo {
            width: 80px;
            height: 80px;
            margin: 0 auto 16px;
            background: white;
            border-radius: var(--radius-lg);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 40px rgba(37, 99, 235, 0.4);
            animation: logoBreath 2s ease-in-out infinite;
            overflow: hidden;
            border: 2px solid rgba(255, 255, 255, 0.3);
        }

        .loading-logo img {
            width: 85%;
            height: 85%;
            object-fit: contain;
        }

        @keyframes logoBreath {
            0%, 100% {
                transform: scale(1);
                box-shadow: 0 0 40px rgba(37, 99, 235, 0.4);
            }
            50% {
                transform: scale(1.04);
                box-shadow: 0 0 60px rgba(37, 99, 235, 0.6);
            }
        }

        .loading-spinner {
            width: 32px;
            height: 32px;
            border: 2.5px solid rgba(255, 255, 255, 0.15);
            border-top: 2.5px solid var(--brand-secondary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 14px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .loading-text {
            color: rgba(255, 255, 255, 0.9);
            font-weight: 700;
            font-size: 0.85rem;
            letter-spacing: 0.5px;
        }

        /* RESPONSIVE */
        @media (max-width: 380px) {
            .app-content {
                padding: 0 12px 12px;
            }
            .logo-gambar {
                width: 70px;
                height: 70px;
            }
            .game-name {
                font-size: 0.78rem;
            }
            .product-column {
                width: 125px;
                gap: 10px;
            }
            .game-card {
                padding: 14px 8px 12px;
            }
            .brand-app h1 {
                font-size: 1.1rem;
            }
            .theme-toggle-app {
                padding: 6px 12px;
                font-size: 0.7rem;
            }
            .operational-panel {
                font-size: 0.7rem;
                padding: 10px 12px;
            }
        }
        
        @media (min-width: 480px) {
            #app-root {
                border-radius: var(--radius-2xl);
                margin-top: 12px;
                height: calc(100vh - 24px);
            }
        }
    </style>
</head>
<body>
<div id="app-root">
    <!-- HEADER -->
    <div class="app-header">
        <div class="brand-app">
            <div class="icon-wrapper">
                <img src="https://i.ibb.co.com/1th4mGLz/1778855680928.jpg" alt="STAA PAY" id="logoImg">
            </div>
            <h1 id="namaToko">STAAPAY</h1>
        </div>
        <button class="theme-toggle-app" id="themeToggleBtn">
            <i class="fas fa-sun" id="iconSun"></i>
            <i class="fas fa-moon" id="iconMoon" style="display:none;"></i>
            <span id="themeText">Light</span>
        </button>
    </div>

    <!-- CONTENT -->
    <div class="app-content" id="appContent">
        <!-- OPERATIONAL PANEL -->
        <div class="operational-panel">
            <span class="time-display"><i class="fas fa-clock"></i> <span id="currentTime">--:--</span></span>
            <span class="time-display"><i class="fas fa-calendar"></i> <span id="jamOperasional">07:00 - 21:00 WIB</span></span>
            <div class="status-wrapper" style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;">
                <div class="status-badge open" id="statusBadge">
                    <i class="fas fa-circle" style="font-size:0.45rem;"></i> <span>Memuat...</span>
                </div>
                <div class="new-version-badge"><i class="fas fa-star"></i><span>NEW VERSION</span></div>
            </div>
        </div>

        <!-- WARNING -->
        <div id="warningBanner" class="warning-banner" style="display:none;">
            <i class="fas fa-exclamation-triangle"></i> <span id="warningMessage">Toko sedang tutup</span>
        </div>

        <!-- BANNER SLIDER -->
        <div class="banner-slider">
            <div class="swiper mySwiper">
                <div class="swiper-wrapper" id="bannerSlides"></div>
                <div class="swiper-pagination"></div>
            </div>
        </div>

        <!-- GAMES SECTION -->
        <div class="section-title"><i class="fas fa-gamepad"></i> Pilihan Top Up</div>
        <div class="game-scroll-wrapper">
            <div class="game-horizontal-flex" id="gameHorizontalList">
                <div class="product-column" style="width:100%;text-align:center;padding:40px;color:var(--text-tertiary);">
                    <i class="fas fa-spinner fa-spin"></i> Memuat produk...
                </div>
            </div>
        </div>

        <!-- KEUNGGULAN -->
        <div class="keunggulan-section">
            <div class="keunggulan-item"><i class="fas fa-bolt"></i> Proses Cepat</div>
            <div class="keunggulan-item"><i class="fas fa-shield-alt"></i> 100% Aman</div>
            <div class="keunggulan-item"><i class="fas fa-headset"></i> CS 24/7</div>
            <div class="keunggulan-item"><i class="fas fa-tag"></i> Termurah</div>
        </div>

        <!-- FOOTER -->
        <div class="footer-staa">© 2026 <span id="footerNama">STAA PAY</span> • Top Up Premium</div>
    </div>

    <!-- BOTTOM NAV -->
    <div class="bottom-nav">
        <button class="nav-item active" data-nav="home"><i class="fas fa-home"></i><span>Beranda</span></button>
        <button class="nav-item" data-nav="reward"><i class="fas fa-gift"></i><span>Reward</span></button>
        <button class="nav-item" data-nav="promo"><i class="fas fa-ticket-alt"></i><span>Promo</span></button>
        <button class="nav-item" data-nav="profile"><i class="fas fa-user"></i><span>Akun</span></button>
    </div>
</div>

<!-- LOADING OVERLAY -->
<div class="loading-overlay" id="loadingOverlay">
    <div class="loading-container">
        <div class="loading-logo"><img src="https://i.ibb.co.com/1th4mGLz/1778855680928.jpg" alt="STAA PAY"></div>
        <div class="loading-spinner"></div>
        <div class="loading-text">MEMUAT...</div>
    </div>
</div>

<!-- POPUP PREMIUM -->
<div class="popup-overlay" id="premiumPopup">
    <div class="popup-container">
        <button class="popup-close" onclick="closePopup()"><i class="fas fa-times"></i></button>
        <h2 style="font-weight:800;font-size:1.4rem;margin:8px 0;color:var(--text-primary);">🚀 <span id="popupNama">STAA PAY</span></h2>
        <img src="https://i.ibb.co.com/sJW5WyKP/quality-restoration-20260519003356441.jpg" class="popup-image" alt="STAA PAY" id="popupImg">
        <button class="popup-button" onclick="closePopup()"><i class="fas fa-rocket"></i> MULAI BELANJA</button>
        <div style="display:flex;justify-content:center;gap:10px;margin-top:14px;">
            <input type="checkbox" id="dontShowAgain">
            <label for="dontShowAgain">Jangan tampilkan lagi</label>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
<script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
<script>
    // =============================================
    // 🔧 KONFIGURASI - GANTI SHEET ID KAMU DISINI
    // =============================================
    const SHEET_ID = '1ufY0TsHeUwDdBeC_duEtQi439HVPuI6xn7aXpjcLozg';

    // =============================================
    // 🎨 THEME TOGGLE
    // =============================================
    const body = document.body;
    const iconSun = document.getElementById('iconSun');
    const iconMoon = document.getElementById('iconMoon');
    const themeText = document.getElementById('themeText');

    function updateThemeUI(isDark) {
        if (isDark) {
            iconSun.style.display = 'none';
            iconMoon.style.display = 'inline-block';
            themeText.textContent = 'Dark';
        } else {
            iconSun.style.display = 'inline-block';
            iconMoon.style.display = 'none';
            themeText.textContent = 'Light';
        }
    }

    if (localStorage.getItem('staa-theme') === 'dark') {
        body.classList.add('dark');
        updateThemeUI(true);
    }

    document.getElementById('themeToggleBtn').addEventListener('click', () => {
        const isDark = body.classList.toggle('dark');
        localStorage.setItem('staa-theme', isDark ? 'dark' : 'light');
        updateThemeUI(isDark);
    });

    // =============================================
    // 📡 FETCH DARI GOOGLE SHEETS (CSV)
    // =============================================
    async function fetchSheetCSV(sheetName) {
        const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=${sheetName}`;
        console.log(`📡 Fetch: ${sheetName} | ${url}`);

        const response = await fetch(url);
        if (!response.ok) throw new Error(`HTTP ${response.status}`);

        const text = await response.text();
        if (!text.trim()) {
            console.warn(`⚠️ Sheet "${sheetName}" kosong`);
            return [];
        }

        const lines = text.trim().split('\n');
        const headers = lines[0].split(',').map(h => h.trim().replace(/^"|"$/g, ''));

        const data = [];
        for (let i = 1; i < lines.length; i++) {
            const values = lines[i].split(',').map(v => v.trim().replace(/^"|"$/g, ''));
            const row = {};
            headers.forEach((h, idx) => { row[h] = values[idx] !== undefined ? values[idx] : ''; });
            data.push(row);
        }

        console.log(`✅ ${sheetName}: ${data.length} baris`);
        return data;
    }

    // =============================================
    // ⚙️ LOAD SETTINGS
    // =============================================
    async function loadSettings() {
        try {
            const data = await fetchSheetCSV('pengaturan');
            if (data.length === 0) {
                console.warn('⚠️ Sheet pengaturan kosong, pakai default');
                return null;
            }

            const settings = {};
            data.forEach(row => {
                if (row.kunci && row.nilai !== undefined) {
                    settings[row.kunci] = row.nilai;
                }
            });

            console.log('📊 Settings loaded:', settings);
            return settings;
        } catch (e) {
            console.error('❌ Gagal load settings:', e.message);
            return null;
        }
    }

    // =============================================
    // 🎮 LOAD GAMES
    // =============================================
    async function loadGames() {
        try {
            const data = await fetchSheetCSV('games');
            const active = data.filter(g => g.aktif === '1');
            console.log(`🎮 ${active.length} games aktif dari ${data.length} total`);
            return active;
        } catch (e) {
            console.error('❌ Gagal load games:', e.message);
            return [];
        }
    }

    // =============================================
    // 🖼️ RENDER BANNER SLIDER
    // =============================================
    function renderBanners(settings) {
        const slides = document.getElementById('bannerSlides');
        const banners = [];

        if (settings) {
            for (let i = 1; i <= 6; i++) {
                const banner = settings[`banner_${i}`];
                if (banner) banners.push(banner);
            }
        }

        // Fallback banners
        if (banners.length === 0) {
            banners.push(
                'https://i.ibb.co.com/cSDHMzQ3/IMG-1369.png',
                'https://splendid-blue-eodgrbuws7.edgeone.app/quality_restoration_20260519004459296.jpg',
                'https://i.ibb.co.com/Q3tncwc1/images-5.jpg'
            );
        }

        slides.innerHTML = banners.map((url, i) => `
            <div class="swiper-slide">
                <img src="${url}" alt="Banner ${i + 1}" onerror="this.src='https://via.placeholder.com/800x400/1e3a8a/ffffff?text=STAA+PAY'">
            </div>
        `).join('');

        new Swiper('.mySwiper', {
            loop: true,
            autoplay: { delay: 3000, disableOnInteraction: false },
            pagination: { el: '.swiper-pagination', clickable: true }
        });
    }

    // =============================================
    // 🎯 RENDER GAMES
    // =============================================
    function renderGames(games) {
        const container = document.getElementById('gameHorizontalList');

        if (games.length === 0) {
            container.innerHTML = '<div class="product-column" style="width:100%;text-align:center;padding:40px;color:var(--text-tertiary);"><i class="fas fa-box-open"></i> Belum ada produk</div>';
            return;
        }

        const columns = [];
        for (let i = 0; i < games.length; i += 2) {
            columns.push(games.slice(i, i + 2));
        }

        container.innerHTML = columns.map(col => {
            const cards = col.map(game => `
                <a href="${game.link}" class="game-card" data-game="${game.game_id}">
                    <div class="logo-gambar">
                        <img src="${game.img_url}" alt="${game.nama}" onerror="this.src='https://via.placeholder.com/85/3b82f6/fff?text=${encodeURIComponent(game.nama.charAt(0))}'">
                    </div>
                    <span class="game-name">${game.nama}</span>
                    <small><i class="fa-regular fa-hand-pointer"></i> ${game.badge || 'Top Up'}</small>
                </a>
            `).join('');
            return `<div class="product-column">${cards}</div>`;
        }).join('');

        attachGameListeners();
    }

    // =============================================
    // 🔗 ATTACH GAME LISTENERS
    // =============================================
    function attachGameListeners() {
        document.querySelectorAll('.game-card').forEach(card => {
            card.addEventListener('click', function(e) {
                if (this.classList.contains('disabled')) {
                    e.preventDefault();
                    alert('⚠️ Toko sedang tutup. Silakan kembali saat jam operasional.');
                    return;
                }

                const url = this.getAttribute('href');
                if (url && !url.startsWith('#')) {
                    e.preventDefault();
                    showLoading(url);
                }
            });
        });
    }

    // =============================================
    // ⏰ CLOCK & STORE STATUS
    // =============================================
    let appSettings = null;

    function updateTime() {
        const now = new Date();
        const wib = new Date(now.getTime() + 7 * 60 * 60 * 1000);
        const h = String(wib.getUTCHours()).padStart(2, '0');
        const m = String(wib.getUTCMinutes()).padStart(2, '0');
        const s = String(wib.getUTCSeconds()).padStart(2, '0');
        document.getElementById('currentTime').textContent = `${h}:${m}:${s}`;
    }

    function updateStoreUI() {
        if (!appSettings) {
            appSettings = { jam_buka: '7', jam_tutup: '21' };
        }

        const openHour = parseInt(appSettings.jam_buka) || 7;
        const closeHour = parseInt(appSettings.jam_tutup) || 21;

        const now = new Date();
        const wib = new Date(now.getTime() + 7 * 60 * 60 * 1000);
        const currentHour = wib.getUTCHours();
        const isOpen = currentHour >= openHour && currentHour < closeHour;

        const badge = document.getElementById('statusBadge');
        const warning = document.getElementById('warningBanner');
        const warningMsg = document.getElementById('warningMessage');
        const jamOp = document.getElementById('jamOperasional');

        if (jamOp) {
            jamOp.textContent = `${String(openHour).padStart(2, '0')}:00 - ${String(closeHour).padStart(2, '0')}:00 WIB`;
        }

        if (isOpen) {
            badge.className = 'status-badge open';
            badge.innerHTML = '<i class="fas fa-circle" style="font-size:0.45rem;"></i><span>BUKA</span>';
            warning.style.display = 'none';
        } else {
            badge.className = 'status-badge closed';
            badge.innerHTML = '<i class="fas fa-circle" style="font-size:0.45rem;"></i><span>TUTUP</span>';
            warning.style.display = 'flex';
            if (warningMsg) {
                warningMsg.textContent = `Toko tutup (${String(openHour).padStart(2, '0')}:00 - ${String(closeHour).padStart(2, '0')}:00 WIB)`;
            }
        }

        document.querySelectorAll('.game-card').forEach(card => {
            if (!isOpen) card.classList.add('disabled');
            else card.classList.remove('disabled');
        });

        console.log(`⏰ Jam: ${currentHour}:00 | ${isOpen ? '🟢 BUKA' : '🔴 TUTUP'} (${openHour}:00-${closeHour}:00)`);
    }

    setInterval(updateTime, 1000);
    setInterval(updateStoreUI, 60000);
    updateTime();

    // =============================================
    // 🔄 LOADING OVERLAY
    // =============================================
    function showLoading(url) {
        document.getElementById('loadingOverlay').classList.add('active');
        setTimeout(() => { window.location.href = url; }, 600);
    }

    function hideLoading() {
        document.getElementById('loadingOverlay').classList.remove('active');
    }

    // =============================================
    // 🎉 POPUP
    // =============================================
    if (!localStorage.getItem('popupClosed')) {
        setTimeout(() => document.getElementById('premiumPopup').classList.add('active'), 800);
    }

    window.closePopup = function() {
        document.getElementById('premiumPopup').classList.remove('active');
        if (document.getElementById('dontShowAgain').checked) {
            localStorage.setItem('popupClosed', 'true');
        }
    };

    // =============================================
    // 📱 BOTTOM NAVIGATION
    // =============================================
    document.querySelectorAll('.nav-item').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');

            const nav = btn.dataset.nav;
            if (nav !== 'home') {
                alert('🎁 Fitur ini akan segera hadir!\n\nStay tuned di STAA PAY!');
                document.querySelector('[data-nav="home"]').classList.add('active');
                btn.classList.remove('active');
            }
        });
    });

    // =============================================
    // 🚀 INISIALISASI UTAMA
    // =============================================
    async function init() {
        console.log('🚀 STAA PAY - Inisialisasi...');
        console.log(`📋 Sheet ID: ${SHEET_ID}`);

        hideLoading();

        // Load Settings
        try {
            appSettings = await loadSettings();

            if (appSettings) {
                // Update UI dari settings
                if (appSettings.nama_toko) {
                    document.getElementById('namaToko').textContent = appSettings.nama_toko;
                    document.getElementById('footerNama').textContent = appSettings.nama_toko;
                    document.getElementById('popupNama').textContent = appSettings.nama_toko;
                    document.title = appSettings.nama_toko + ' · TOP UP APP';
                }
                if (appSettings.logo_url) {
                    document.getElementById('logoImg').src = appSettings.logo_url;
                }
                if (appSettings.popup_img) {
                    document.getElementById('popupImg').src = appSettings.popup_img;
                }

                // Render banners
                renderBanners(appSettings);
            } else {
                renderBanners(null);
            }
        } catch (e) {
            console.error('❌ Gagal init settings:', e);
            appSettings = { jam_buka: '7', jam_tutup: '21' };
            renderBanners(null);
        }

        // Update store UI
        updateStoreUI();

        // Load & Render Games
        try {
            const games = await loadGames();
            renderGames(games);
        } catch (e) {
            console.error('❌ Gagal load games:', e);
            document.getElementById('gameHorizontalList').innerHTML = '<div class="product-column" style="width:100%;text-align:center;padding:40px;color:var(--text-tertiary);"><i class="fas fa-exclamation-triangle"></i> Gagal memuat produk</div>';
        }

        // Update lagi setelah games dirender
        updateStoreUI();

        console.log('✅ Inisialisasi selesai!');
    }

    // =============================================
    // 🔄 BFCACHE HANDLER
    // =============================================
    window.addEventListener('pageshow', (e) => {
        if (e.persisted) {
            hideLoading();
            if (appSettings) updateStoreUI();
        }
    });

    // =============================================
    // 🛡️ SAFETY NET
    // =============================================
    setTimeout(hideLoading, 4000);

    // =============================================
    // ▶️ START
    // =============================================
    document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
