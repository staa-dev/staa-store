<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>STAA STORE · </title>
  <!-- Google Fonts (Outfit) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
  <!-- Font Awesome 6 -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <!-- Swiper CSS (untuk banner slide) -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Outfit', sans-serif;
      background-color: var(--bg-body);
      color: var(--text-primary);
      transition: background-color 0.4s ease, color 0.3s ease;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }

    /* VARIABEL LIGHT (default) */
    :root {
      --bg-body: #f6f3fc;
      --bg-card: #ffffff;
      --text-primary: #1e1a2b;
      --text-soft: #4b415b;
      --accent-ungu: #8b5cf6;
      --accent-ungu-dark: #6d28d9;
      --list-merah: #dc2626;
      --list-bg-merah: #fee2e2;
      --border-muted: #e2d9f0;
      --store-highlight: #581c87;
      --shadow-sm: 0 8px 20px rgba(106, 57, 175, 0.08);
      --toggle-bg: #ddd6fe;
      --toggle-knob: #8b5cf6;
      --icon-sun: #f59e0b;
      --icon-moon: #4b4168;
      --banner-dot: #cbd5e0;
      --banner-dot-active: #8b5cf6;
    }

    /* VARIABEL DARK */
    body.dark {
      --bg-body: #12101a;
      --bg-card: #1f1b2b;
      --text-primary: #f0eaff;
      --text-soft: #cbbaf0;
      --accent-ungu: #b47aff;
      --accent-ungu-dark: #9f67ff;
      --list-merah: #f87171;
      --list-bg-merah: #3f2330;
      --border-muted: #332e44;
      --store-highlight: #d8b4ff;
      --shadow-sm: 0 8px 22px rgba(0, 0, 0, 0.7);
      --toggle-bg: #2d2643;
      --toggle-knob: #b47aff;
      --icon-sun: #a78bfa;
      --icon-moon: #fcd34d;
      --banner-dot: #4b415b;
      --banner-dot-active: #b47aff;
    }

    .container {
      max-width: 880px;
      width: 100%;
      background: var(--bg-card);
      border-radius: 42px;
      padding: 2rem 2rem 2.5rem 2rem;
      box-shadow: var(--shadow-sm);
      border: 1px solid var(--border-muted);
      transition: background-color 0.4s ease, border-color 0.3s ease, box-shadow 0.3s ease;
    }

    /* HEADER: STAA STORE + toggle ubah */
    .header-store {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 2rem;
      flex-wrap: wrap;
      gap: 15px;
    }

    .staa-brand {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .staa-brand i {
      font-size: 2rem;
      color: var(--accent-ungu);
      background: var(--bg-body);
      padding: 10px;
      border-radius: 24px;
      transition: background-color 0.3s ease, color 0.3s ease;
    }

    .staa-brand h1 {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: -0.5px;
      background: linear-gradient(130deg, var(--accent-ungu) 20%, var(--store-highlight) 80%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    /* TOGGLE UBAH */
    .theme-toggle-btn {
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--toggle-bg);
      border: 2px solid var(--accent-ungu);
      border-radius: 50px;
      padding: 8px 18px;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 4px 12px rgba(139, 92, 246, 0.2);
    }

    .theme-toggle-btn i {
      font-size: 1.4rem;
      transition: all 0.3s ease;
    }

    .theme-toggle-btn .fa-sun {
      color: var(--icon-sun);
    }

    .theme-toggle-btn .fa-moon {
      color: var(--icon-moon);
    }

    .theme-toggle-btn span {
      font-weight: 600;
      font-size: 1rem;
      color: var(--text-primary);
    }

    .theme-toggle-btn:hover {
      transform: scale(1.02);
      border-color: var(--accent-ungu-dark);
    }

    /* list merah */
    .list-merah-mini {
      background-color: var(--list-bg-merah);
      border-radius: 40px;
      padding: 0.7rem 1.5rem;
      margin-bottom: 2rem;
      display: inline-flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 1rem 0.5rem;
      border: 1px solid var(--list-merah);
      box-shadow: 0 2px 0 var(--list-merah);
      transition: background-color 0.3s ease, border-color 0.2s ease;
    }

    .list-merah-mini span {
      font-weight: 600;
      color: var(--list-merah);
      font-size: 0.9rem;
      display: flex;
      align-items: center;
      gap: 6px;
      background: var(--bg-card);
      padding: 0.2rem 1rem;
      border-radius: 30px;
    }

    /* BANNER SLIDER DENGAN GAMBAR */
    .banner-slider {
      margin-bottom: 2.5rem;
      border-radius: 24px;
      overflow: hidden;
      box-shadow: 0 8px 18px rgba(0,0,0,0.1);
    }

    .swiper {
      width: 100%;
      height: 180px;
      border-radius: 24px;
    }

    .swiper-slide {
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Overlay gelap agar teks terbaca */
    .swiper-slide::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.3);
      border-radius: 24px;
    }

    .swiper-slide span {
      position: relative;
      z-index: 2;
      background: rgba(0,0,0,0.5);
      padding: 0.5rem 2rem;
      border-radius: 60px;
      backdrop-filter: blur(4px);
      color: white;
      font-weight: 700;
      font-size: 1.3rem;
      border: 1px solid rgba(255,255,255,0.3);
    }

    .swiper-pagination-bullet {
      background: var(--banner-dot);
      opacity: 0.7;
    }
    .swiper-pagination-bullet-active {
      background: var(--banner-dot-active) !important;
    }

    /* grid dua game dengan logo gambar */
    .game-simple-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 1.5rem;
      justify-content: center;
      margin: 2rem 0 0.8rem;
    }

    .game-simple-link {
      background: transparent;
      text-decoration: none;
      color: inherit;
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 180px;
      padding: 1rem 0.5rem;
      border-radius: 32px;
      transition: all 0.25s ease;
      border: 2px solid transparent;
    }

    .game-simple-link:hover {
      border-color: var(--accent-ungu);
      background: var(--bg-body);
      transform: scale(1.02);
    }

    .logo-gambar {
      width: 130px;
      height: 130px;
      border-radius: 50%;
      overflow: hidden;
      background: var(--bg-body);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 8px 0 var(--accent-ungu-dark);
      border: 3px solid var(--border-muted);
      transition: box-shadow 0.2s ease, border-color 0.3s ease;
      margin-bottom: 0.8rem;
    }

    .game-simple-link:hover .logo-gambar {
      box-shadow: 0 6px 0 var(--accent-ungu);
      border-color: var(--accent-ungu);
    }

    .logo-gambar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .game-name {
      font-weight: 700;
      font-size: 1.5rem;
      margin-top: 0.2rem;
    }
    .ff-name { color: #e64545; }
    .ml-name { color: #2b7ae2; }

    .game-simple-link small {
      color: var(--text-soft);
      font-size: 0.85rem;
      display: flex;
      align-items: center;
      gap: 5px;
      margin-top: 6px;
      background: var(--bg-card);
      padding: 0.2rem 1rem;
      border-radius: 30px;
      border: 1px dashed var(--accent-ungu);
    }

    /* footer */
    .footer-staa {
      margin-top: 2.5rem;
      text-align: center;
      color: var(--text-soft);
      font-size: 0.95rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      border-top: 1px solid var(--border-muted);
      padding-top: 1.5rem;
    }

    .footer-staa strong {
      color: var(--accent-ungu);
      background: var(--bg-body);
      padding: 0.2rem 1rem;
      border-radius: 40px;
    }

    @media (max-width: 500px) {
      .container { padding: 1.5rem; }
      .staa-brand h1 { font-size: 1.7rem; }
      .game-simple-link { width: 150px; }
      .logo-gambar { width: 110px; height: 110px; }
      .swiper { height: 140px; }
      .swiper-slide span { font-size: 1rem; padding: 0.4rem 1rem; }
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Header STAA STORE + toggle -->
    <div class="header-store">
      <div class="staa-brand">
        <i class="fas fa-dragon"></i>
        <h1>STAA STORE</h1>
      </div>

      <!-- TOGGLE UBAH -->
      <div class="theme-toggle-btn" id="themeToggleBtn">
        <i class="fas fa-sun" id="toggleIconSun"></i>
        <i class="fas fa-moon" id="toggleIconMoon"></i>
        <span id="toggleText">Light</span>
      </div>
    </div>

    <!-- BANNER SLIDER DENGAN GAMBAR -->
    <div class="banner-slider">
      <div class="swiper mySwiper">
        <div class="swiper-wrapper">
          <!-- SLIDE 1 - Ganti background-image dengan URL gambar kalian -->
          <div class="swiper-slide" style="background-image: url('https://i.ibb.co.com/YTjpgrpn/Banner-Ramadan-Dekoratif-Ornamental-Coklat-Krem-20260306-201402-000.jpg');">
          </div>
          <!-- SLIDE 2 - Ganti dengan gambar Free Fire -->
          <div class="swiper-slide" style="background-image: url('https://assets.pikiran-rakyat.com/crop/0x0:0x0/720x0/webp/photo/2024/03/11/412049712.jpg');">
          </div>
          <!-- SLIDE 3 - Ganti dengan gambar Mobile Legends -->
          <div class="swiper-slide" style="background-image: url('https://i.ibb.co.com/Q3tncwc1/images-5.jpg');">
          </div>
          <!-- SLIDE 4 - Tambahan slide dengan gambar lain -->
          <div class="swiper-slide" style="background-image: url('https://images.unsplash.com/photo-1607799279861-4dd421887fb3?w=800&auto=format');">
            <span>🎯 TOP UP AMAN</span>
          </div>
        </div>
        <div class="swiper-pagination"></div>
      </div>
    </div>

    <!-- DUA GAME DENGAN LOGO GAMBAR -->
    <div class="game-simple-grid">
      <!-- Free Fire -->
      <a href="ff.html" target="_blank" class="game-simple-link">
        <div class="logo-gambar">
          <!-- Ganti src dengan gambar logo Free Fire kalian -->
          <img src="https://i.ibb.co.com/TxB12q8B/Screenshot-20250516-191232-2450692357.webp" alt="Free Fire" onerror="this.src='https://via.placeholder.com/130x130/e64545/ffffff?text=FF'">
        </div>
        <span class="game-name ff-name">Free Fire</span>
        <small><i class="fa-regular fa-hand-pointer"></i> klik</small>
      </a>

      <!-- Mobile Legends -->
      <a href="ml.html" target="_blank" class="game-simple-link">
        <div class="logo-gambar">
          <!-- Ganti src dengan gambar logo Mobile Legends kalian -->
          <img src="https://i.ibb.co.com/8LYbYcy9/images-4.jpg" alt="Mobile Legends" onerror="this.src='https://via.placeholder.com/130x130/2b7ae2/ffffff?text=ML'">
        </div>
        <span class="game-name ml-name">MobileLegends</span>
        <small><i class="fa-regular fa-hand-pointer"></i> klik</small>
      </a>
    </div>

    <!-- Footer -->
    <div class="footer-staa">
      <span>✦</span>
      <strong>STAA STORE</strong>
      <span>✦</span>
      <i class="fa-solid fa-circle" style="color: var(--accent-ungu); font-size: 0.5rem;"></i>
      <span>#topupsimpel</span>
    </div>
  </div>

  <!-- Swiper JS -->
  <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
  
  <script>
    (function() {
      // ========== THEME TOGGLE ==========
      const themeBtn = document.getElementById('themeToggleBtn');
      const toggleIconSun = document.getElementById('toggleIconSun');
      const toggleIconMoon = document.getElementById('toggleIconMoon');
      const toggleText = document.getElementById('toggleText');
      
      function updateToggleAppearance(isDark) {
        if (isDark) {
          toggleIconSun.style.opacity = '0.5';
          toggleIconMoon.style.opacity = '1';
          toggleIconMoon.style.color = 'var(--icon-moon)';
          toggleText.textContent = 'Dark';
        } else {
          toggleIconSun.style.opacity = '1';
          toggleIconMoon.style.opacity = '0.5';
          toggleIconSun.style.color = 'var(--icon-sun)';
          toggleText.textContent = 'Light';
        }
      }

      if (localStorage.getItem('staa-theme') === 'dark') {
        document.body.classList.add('dark');
        updateToggleAppearance(true);
      } else {
        document.body.classList.remove('dark');
        updateToggleAppearance(false);
      }

      function switchTheme(isDark) {
        if (isDark) {
          document.body.classList.add('dark');
          localStorage.setItem('staa-theme', 'dark');
        } else {
          document.body.classList.remove('dark');
          localStorage.setItem('staa-theme', 'light');
        }
        updateToggleAppearance(isDark);
      }

      themeBtn.addEventListener('click', function() {
        const isDark = !document.body.classList.contains('dark');
        switchTheme(isDark);
      });

      // ========== SWIPER BANNER SLIDER ==========
      const swiper = new Swiper('.mySwiper', {
        loop: true,
        autoplay: {
          delay: 3000,
          disableOnInteraction: false,
        },
        pagination: {
          el: '.swiper-pagination',
          clickable: true,
        },
        speed: 600,
      });
    })();
  </script>

  <!-- INSTRUKSI:
    1. GANTI GAMBAR BANNER: Edit style="background-image: url('...')" pada setiap swiper-slide
    2. GANTI GAMBAR LOGO: Edit src pada tag img di dalam .logo-gambar
    3. Format gambar: PNG, JPG, WebP, ukuran bebas (akan di-crop otomatis)
    4. Fallback: Jika gambar gagal dimuat, akan tampil placeholder berwarna
  -->
</body>
</html>
